<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a56a0"/>

  <!-- Bus body -->
  <rect x="10" y="18" width="44" height="26" rx="5" ry="5" fill="#ffffff"/>

  <!-- Bus roof -->
  <rect x="12" y="14" width="40" height="8" rx="3" ry="3" fill="#e8f0fb"/>

  <!-- Windows -->
  <rect x="15" y="21" width="10" height="8" rx="2" fill="#1a56a0"/>
  <rect x="28" y="21" width="10" height="8" rx="2" fill="#1a56a0"/>
  <rect x="41" y="21" width="10" height="8" rx="2" fill="#1a56a0"/>

  <!-- Door -->
  <rect x="28" y="31" width="8" height="10" rx="1" fill="#e8f0fb"/>

  <!-- Front stripe -->
  <rect x="10" y="33" width="44" height="3" fill="#f97316" opacity="0.8"/>

  <!-- Wheels -->
  <circle cx="20" cy="46" r="5" fill="#374151"/>
  <circle cx="20" cy="46" r="2.5" fill="#9ca3af"/>
  <circle cx="44" cy="46" r="5" fill="#374151"/>
  <circle cx="44" cy="46" r="2.5" fill="#9ca3af"/>
</svg>
